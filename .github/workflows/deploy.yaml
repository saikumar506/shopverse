deploy:
  name: Provision Infra & Deploy
  runs-on: ubuntu-latest
  needs: build-and-push

  steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    #########################################################################
    # DEBUG
    #########################################################################

    - name: Debug AWS Identity
      run: |
        echo "========== AWS Identity =========="
        aws sts get-caller-identity

    - name: Debug Environment
      run: |
        echo "========== Environment =========="
        echo "AWS_REGION=$AWS_REGION"
        echo "EKS_CLUSTER_NAME=$EKS_CLUSTER_NAME"
        echo "ECR_REGISTRY=$ECR_REGISTRY"

    - name: List EKS Clusters
      run: |
        echo "========== Existing Clusters =========="
        aws eks list-clusters --region $AWS_REGION

    #########################################################################
    # CHECK CLUSTER
    #########################################################################

    - name: Check if EKS cluster exists
      id: check-cluster
      shell: bash
      run: |

        echo "Checking cluster: $EKS_CLUSTER_NAME"

        if aws eks describe-cluster \
          --name "$EKS_CLUSTER_NAME" \
          --region "$AWS_REGION"; then

          echo "Cluster FOUND"
          echo "cluster_exists=true" >> "$GITHUB_OUTPUT"

        else

          EXIT_CODE=$?

          echo ""
          echo "describe-cluster failed."
          echo "Exit Code: $EXIT_CODE"

          echo ""
          echo "Trying again with full output..."

          aws eks describe-cluster \
            --name "$EKS_CLUSTER_NAME" \
            --region "$AWS_REGION"

          echo "cluster_exists=false" >> "$GITHUB_OUTPUT"

        fi

    - name: Print Decision
      run: |
        echo "cluster_exists=${{ steps.check-cluster.outputs.cluster_exists }}"

    #########################################################################
    # TERRAFORM
    #########################################################################

    - name: Setup Terraform
      if: steps.check-cluster.outputs.cluster_exists == 'false'
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.7.0"

    - name: Terraform Init
      if: steps.check-cluster.outputs.cluster_exists == 'false'
      working-directory: ./terraform
      run: |
        terraform init \
          -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
          -backend-config="key=eks/terraform.tfstate" \
          -backend-config="region=${{ env.AWS_REGION }}"

    - name: Terraform Plan
      if: steps.check-cluster.outputs.cluster_exists == 'false'
      working-directory: ./terraform
      run: |
        terraform plan \
          -var="aws_region=${{ env.AWS_REGION }}" \
          -var="cluster_name=${{ env.EKS_CLUSTER_NAME }}" \
          -var="project_name=shopverse" \
          -var="create_jump_server=false" \
          -out=tfplan

    - name: Terraform Apply
      if: steps.check-cluster.outputs.cluster_exists == 'false'
      working-directory: ./terraform
      run: terraform apply -auto-approve tfplan

    #########################################################################
    # WAIT FOR CLUSTER
    #########################################################################

    - name: Wait for EKS cluster
      if: steps.check-cluster.outputs.cluster_exists == 'false'
      run: |
        aws eks wait cluster-active \
          --name ${{ env.EKS_CLUSTER_NAME }} \
          --region ${{ env.AWS_REGION }}

        aws eks wait nodegroup-active \
          --cluster-name ${{ env.EKS_CLUSTER_NAME }} \
          --nodegroup-name ${{ env.EKS_CLUSTER_NAME }}-nodes \
          --region ${{ env.AWS_REGION }}

    #########################################################################
    # INSTALL TOOLS
    #########################################################################

    - name: Install kubectl
      uses: azure/setup-kubectl@v3

    - name: Install Helm
      uses: azure/setup-helm@v3

    #########################################################################
    # CONFIGURE KUBECONFIG
    #########################################################################

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name ${{ env.EKS_CLUSTER_NAME }} \
          --region ${{ env.AWS_REGION }}

    #########################################################################
    # LOGIN TO ECR
    #########################################################################

    - name: Login to ECR for Helm
      run: |
        aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
        helm registry login \
          --username AWS \
          --password-stdin \
          ${{ env.ECR_REGISTRY }}

    #########################################################################
    # DEPLOY
    #########################################################################

    - name: Deploy Helm Chart
      run: |
        helm upgrade --install shopverse \
          oci://${{ env.ECR_REGISTRY }}/shopverse-helmchart/shopverse \
          --version 1.0.0-${{ github.sha }} \
          --set frontend.image=${{ env.ECR_REGISTRY }}/shopverse-frontend:${{ github.sha }} \
          --set backend.image=${{ env.ECR_REGISTRY }}/shopverse-backend:${{ github.sha }} \
          --set mysql.rootPassword=${{ secrets.MYSQL_ROOT_PASSWORD }} \
          --set mysql.password=${{ secrets.MYSQL_PASSWORD }} \
          --set jwtSecret=${{ secrets.JWT_SECRET }} \
          --namespace shopverse \
          --create-namespace \
          --wait \
          --timeout 300s \
          --cleanup-on-fail

    #########################################################################
    # VERIFY
    #########################################################################

    - name: Verify Deployment
      run: |
        echo "========== Nodes =========="
        kubectl get nodes -o wide

        echo ""
        echo "========== Pods =========="
        kubectl get pods -n shopverse

        echo ""
        echo "========== Services =========="
        kubectl get svc -n shopverse

        echo ""
        echo "========== StatefulSets =========="
        kubectl get sts -n shopverse

        echo ""
        echo "========== PVC =========="
        kubectl get pvc -n shopverse

        echo ""
        echo "========== Ingress =========="
        kubectl get ingress -n shopverse || true
